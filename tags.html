<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - All Tags</title>
    <meta name="description" content="Explore all game tags on GameHub to find games by category.">
    <meta name="keywords" content="games, gaming platform, video games, GameHub, game tags">
    <meta name="robots" content="index, follow">
    <meta name="author" content="GameHub Team">
    <meta property="og:title" content="GameHub - All Tags">
    <meta property="og:description" content="Browse all game tags to discover games by category on GameHub.">
    <meta property="og:image"
        content="https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <meta property="og:url" content="https://gamehub.example.com/tags.html">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://gamehub.example.com/tags.html">
    <link rel="icon" type="image/png" href="https://via.placeholder.com/32x32/40c4ff/ffffff?text=GH">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
        crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: rgba(64, 196, 255, 0.6);
            --secondary-color: rgba(2, 136, 209, 0.8);
            --solid-primary: #40c4ff;
            --bg-dark: #000000;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.4);
            --text-white: #ffffff;
            --text-muted: #cccccc;
            --cloud-glow: rgba(255, 255, 255, 0.2);
            --error-color: #ff6b6b;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            font-size: clamp(16px, 2vw, 18px);
        }

        a {
            text-decoration: none;
            color: var(--text-white);
            transition: var(--transition);
        }

        a:focus,
        button:focus,
        input:focus {
            outline: 3px solid var(--solid-primary);
            outline-offset: 2px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 1.75rem);
            font-weight: 700;
            color: var(--solid-primary);
        }

        .search-bar {
            display: flex;
            align-items: center;
            max-width: 400px;
            width: 100%;
        }

        .search-bar input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px 0 0 20px;
            background-color: var(--card-bg);
            color: var(--text-white);
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            transition: var(--transition);
        }

        .search-bar input:focus {
            border-color: var(--solid-primary);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-bar button {
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 0 20px 20px 0;
            color: var(--text-white);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 10px var(--cloud-glow);
            font-size: 0.9rem;
        }

        .search-bar button:hover:not(:disabled) {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
            box-shadow: 0 0 15px var(--cloud-glow);
        }

        .search-bar button i {
            color: var(--text-white);
        }

        main {
            background-color: var(--bg-dark);
            max-width: 1200px;
            margin: 0 auto;
        }

        .tags-container,
        .links-container {
            margin: 0 clamp(2.5rem, 6vw, 3rem);
        }

        .section-title {
            padding: 2rem 0 1rem;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--text-white);
            border-bottom: 2px solid var(--solid-primary);
            margin-bottom: 1.5rem;
        }

        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 2rem;
        }

        .tag-button {
            background-color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            color: var(--text-white);
            font-size: 0.9rem;
            transition: var(--transition);
            text-transform: capitalize;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 10px var(--cloud-glow);
        }

        .tag-button:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
            box-shadow: 0 0 15px var(--cloud-glow);
        }

        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            padding-bottom: 2rem;
        }

        .link-button {
            background-color: var(--primary-color);
            color: var(--text-white);
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: var(--transition);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 10px var(--cloud-glow);
        }

        .link-button:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
            box-shadow: 0 0 15px var(--cloud-glow);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 1rem;
            padding: 2rem;
        }

        .error-message {
            color: var(--error-color);
            text-align: center;
            padding: 2rem;
            font-size: 1rem;
        }

        footer {
            background-color: var(--bg-dark);
            padding: 2rem clamp(2rem, 5vw, 2.5rem);
            text-align: center;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-content p {
            color: var(--text-white);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-white);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .social-links a:hover {
            color: var(--solid-primary);
        }

        @media (max-width: 768px) {

            .tags-container,
            .links-container {
                margin: 0 clamp(2rem, 5vw, 2.5rem);
            }

            .top-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .search-bar {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {

            .tags-container,
            .links-container {
                margin: 0 clamp(1.5rem, 4vw, 2rem);
            }

            .tag-button {
                width: 100%;
                text-align: center;
            }

            .link-button {
                width: 100%;
                padding: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <header class="top-bar" role="banner">
        <a href="index.html" class="logo" aria-label="GameHub Home">GameHub</a>
        <div class="search-bar" role="search">
            <input type="text" id="search-input" placeholder="Search games..." aria-label="Search for games">
            <button id="search-button" aria-label="Search"><i class="fas fa-magnifying-glass"></i></button>
        </div>
    </header>
    <main>
        <section class="tags-container" aria-labelledby="tags-section">
            <h2 class="section-title" id="tags-section">All Tags</h2>
            <div class="tags-grid" id="tags-grid">
                <p class="loading">Loading tags...</p>
            </div>
        </section>
        <section class="links-container" aria-labelledby="links-section">
            <h2 class="section-title" id="links-section">Explore More</h2>
            <div class="links-grid">
                <a href="/browse-all" class="link-button" aria-label="Browse all games">Browse All Games</a>
                <a href="/top-rated" class="link-button" aria-label="View top rated games">Top Rated</a>
                <a href="/new-releases" class="link-button" aria-label="View new releases">New Releases</a>
                <a href="/contact" class="link-button" aria-label="Contact us">Contact Us</a>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <p>GameHub &copy; 2025. Your ultimate platform for gaming news, updates, and downloads.</p>
            <div class="social-links">
                <a href="https://twitter.com/gamehub" aria-label="Follow us on Twitter"><i
                        class="fab fa-twitter"></i></a>
                <a href="https://facebook.com/gamehub" aria-label="Follow us on Facebook"><i
                        class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/gamehub" aria-label="Follow us on Instagram"><i
                        class="fab fa-instagram"></i></a>
                <a href="https://discord.gg/gamehub" aria-label="Join our Discord"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GameHub",
        "url": "https://gamehub.example.com",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://gamehub.example.com/search.html?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <script>
        // Note: To run this file, use a local web server (e.g., 'npx http-server' or VS Code Live Server)
        // due to CORS restrictions with fetch requests.
        async function fetchTags() {
            try {
                // Load the .proto file content
                const protoContent = `
                    syntax = "proto3";
                    package gamehub;
                    message Game {
                        string title = 1;
                        string developer = 2;
                        string version = 3;
                        string status = 4;
                        repeated string tags = 5;
                        string description = 6;
                        string download = 7;
                        string language = 8;
                        repeated string images = 9;
                    }
                    message GameList {
                        repeated Game games = 1;
                    }
                `;

                // Load the protobuf schema
                const root = await protobuf.parse(protoContent, { keepCase: true }).root;
                const GameListMessage = root.lookupType("gamehub.GameList");

                // Fetch the protobuf binary data
                const response = await fetch('public/data/games.pb');
                if (!response.ok) {
                    throw new Error(`Failed to fetch games.pb: ${response.statusText}`);
                }
                const protoBinaryData = new Uint8Array(await response.arrayBuffer());

                // Decode the binary data
                const message = GameListMessage.decode(protoBinaryData);
                const games = message.games;

                const allTags = new Set();
                games.forEach(game => {
                    if (game.tags && Array.isArray(game.tags)) {
                        game.tags.forEach(tag => allTags.add(tag.toLowerCase()));
                    }
                });
                const tags = Array.from(allTags).sort();
                renderTags(tags);
            } catch (error) {
                console.error("Error loading tags:", error);
                document.getElementById("tags-grid").innerHTML =
                    `<p class="error-message">Failed to load tags. Please try again later.</p>`;
            }
        }

        function renderTags(tags) {
            const tagsGrid = document.getElementById("tags-grid");
            tagsGrid.innerHTML = "";
            if (tags.length === 0) {
                tagsGrid.innerHTML = `<p class="error-message">No tags found.</p>`;
                return;
            }
            tags.forEach(tag => {
                const tagButton = document.createElement("a");
                tagButton.className = "tag-button";
                tagButton.href = `tag-results.html?tag=${encodeURIComponent(tag)}`;
                tagButton.textContent = tag;
                tagButton.setAttribute("aria-label", `View games with ${tag} tag`);
                tagsGrid.appendChild(tagButton);
            });
        }

        function handleSearch() {
            const query = document.getElementById("search-input").value.trim();
            if (query) {
                window.location.href = `search.html?query=${encodeURIComponent(query)}`;
            }
        }

        document.getElementById("search-button").addEventListener("click", handleSearch);
        document.getElementById("search-input").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                handleSearch();
            }
        });

        window.onload = fetchTags;
    </script>
</body>

</html>
