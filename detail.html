<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details - GameHub</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.rel='stylesheet'"
        integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
        crossorigin="anonymous">
    <style>
        :root {
            --primary-color: rgba(64, 196, 255, 0.6);
            --secondary-color: rgba(2, 136, 209, 0.8);
            --solid-primary: #40c4ff;
            --bg-dark: #000000;
            --card-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.4);
            --text-white: #ffffff;
            --text-muted: #cccccc;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            font-size: clamp(16px, 2vw, 18px);
        }

        a {
            text-decoration: none;
            color: var(--text-white);
            transition: var(--transition);
        }

        a:focus,
        button:focus,
        input:focus {
            outline: 3px solid var(--solid-primary);
            outline-offset: 2px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: clamp(1.5rem, 3vw, 1.75rem);
            font-weight: 700;
            color: var(--solid-primary);
        }

        .search-bar {
            display: flex;
            align-items: center;
            max-width: 400px;
            width: 100%;
        }

        .search-bar input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px 0 0 20px;
            background-color: var(--card-bg);
            color: var(--text-white);
            font-size: 0.9rem;
            width: 100%;
        }

        .search-bar input:focus {
            border-color: var(--solid-primary);
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-bar button {
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 0 20px 20px 0;
            color: var(--text-white);
            cursor: pointer;
            transition: var(--transition);
        }

        .search-bar button:hover:not(:disabled) {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        main {
            background-color: var(--bg-dark);
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-details,
        .links-container {
            margin: 0 clamp(2.5rem, 6vw, 3rem);
        }

        .section-title {
            padding: 2rem 0 1rem;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--text-white);
            border-bottom: 2px solid var(--solid-primary);
            margin-bottom: 1.5rem;
        }

        .game-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 500px;
        }

        .game-content h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: var(--text-white);
            text-align: left;
            width: 100%;
            max-width: 600px;
        }

        .game-content p {
            margin: 10px 0;
            font-size: 15px;
            color: var(--text-muted);
            text-align: left;
            width: 100%;
            max-width: 600px;
        }

        .game-content b {
            color: var(--solid-primary);
        }

        .game-thumbnail {
            width: 100%;
            max-width: 400px;
            height: auto;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin: 0 auto 20px;
            aspect-ratio: 2 / 1;
        }

        .download-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
            max-width: 600px;
        }

        .math-challenge {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .math-challenge label {
            color: var(--text-white);
            font-size: 15px;
        }

        .math-challenge input {
            padding: 5px;
            width: 60px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-white);
            font-size: 14px;
            text-align: center;
        }

        .math-challenge button {
            background-color: var(--primary-color);
            color: var(--text-white);
            padding: 5px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }

        .math-challenge button:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        .download-button {
            display: inline-block;
            background-color: var(--primary-color);
            color: var(--text-white);
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            transition: var(--transition);
            pointer-events: none;
            opacity: 0.6;
        }

        .download-button.active {
            pointer-events: auto;
            opacity: 1;
        }

        .download-button:hover.active {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        .tag-button {
            background-color: var(--primary-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            color: var(--text-white);
            font-size: 0.9rem;
            transition: var(--transition);
            text-transform: capitalize;
        }

        .tag-button:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        .gallery {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
            min-height: 150px;
        }

        .gallery h3 {
            grid-column: 1 / -1;
            text-align: left;
            margin-bottom: 10px;
            color: var(--text-white);
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-image-container {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .modal-image-container:active {
            cursor: grabbing;
        }

        .modal img {
            max-width: none;
            max-height: none;
            width: auto;
            height: auto;
            transform-origin: 0 0;
            transition: transform 0.2s ease;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--primary-color);
            color: var(--text-white);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        .links-container {
            margin: 2rem clamp(2.5rem, 6vw, 3rem);
        }

        .links-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            padding-bottom: 2rem;
        }

        .link-button {
            background-color: var(--primary-color);
            color: var(--text-white);
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .link-button:hover {
            background-color: var(--secondary-color);
            border-color: var(--solid-primary);
        }

        footer {
            background-color: var(--bg-dark);
            padding: 2rem clamp(2rem, 5vw, 2.5rem);
            text-align: center;
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }

        .footer-content p {
            color: var(--text-white);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-white);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .social-links a:hover {
            color: var(--solid-primary);
        }

        .skeleton {
            background: var(--card-bg);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @media (max-width: 768px) {
            .game-details,
            .links-container {
                margin: 0 clamp(2rem, 5vw, 2.5rem);
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                max-width: 500px;
            }

            .gallery img {
                height: 120px;
            }

            .game-thumbnail {
                max-width: 300px;
            }

            .modal-image-container {
                max-width: 95vw;
                max-height: 80vh;
            }

            .modal-close {
                top: 15px;
                right: 15px;
                width: 35px;
                height: 35px;
            }

            .top-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .search-bar {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .game-details,
            .links-container {
                margin: 0 clamp(1.5rem, 4vw, 2rem);
            }

            .game-content {
                padding: 20px;
            }

            .game-content h2,
            .game-content p,
            .download-section {
                max-width: 100%;
            }

            .game-thumbnail {
                max-width: 100%;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                max-width: 100%;
            }

            .gallery img {
                height: 100px;
            }

            .modal-image-container {
                max-width: 98vw;
                max-height: 75vh;
            }

            .modal-close {
                top: 10px;
                right: 10px;
                width: 30px;
                height: 30px;
            }

            .link-button {
                width: 100%;
                padding: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <header class="top-bar" role="banner">
        <a href="index.html" class="logo" id="logo-link" aria-label="GameHub Home">GameHub</a>
        <div class="search-bar" role="search">
            <input type="text" id="search-input" placeholder="Search games..." aria-label="Search for games">
            <button id="search-button" aria-label="Search"><i class="fas fa-magnifying-glass"></i></button>
        </div>
    </header>
    <main>
        <section class="game-details" aria-labelledby="game-details">
            <h2 class="section-title" id="game-details">Game Details</h2>
            <div id="game-details-content">
                <div class="game-content">
                    <h2 class="skeleton" style="height: 28px; width: 100%; max-width: 300px;"></h2>
                    <div class="skeleton game-thumbnail" style="width: 100%; max-width: 400px; height: 200px;"></div>
                    <h3 class="skeleton" style="height: 20px; width: 200px;"></h3>
                    <div class="gallery skeleton" style="min-height: 150px; width: 100%; max-width: 600px;"></div>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <p class="skeleton" style="height: 15px; width: 100%; max-width: 600px; margin: 10px 0;"></p>
                    <div class="download-section">
                        <div class="math-challenge skeleton" style="height: 30px; width: 300px; margin-bottom: 15px;"></div>
                        <a class="download-button skeleton" style="height: 40px; width: 150px; pointer-events: none; opacity: 1;"></a>
                    </div>
                </div>
            </div>
        </section>
        <section class="links-container" aria-labelledby="links-section">
            <h2 class="section-title" id="links-section">Explore More</h2>
            <div class="links-grid">
                <a href="/browse-all" class="link-button" aria-label="Browse all games">Browse All Games</a>
                <a href="/top-rated" class="link-button" aria-label="View top rated games">Top Rated</a>
                <a href="/new-releases" class="link-button" aria-label="View new releases">New Releases</a>
                <a href="/contact" class="link-button" aria-label="Contact us">Contact Us</a>
            </div>
        </section>
        <div id="image-modal" class="modal">
            <div class="modal-image-container" id="modal-image-container">
                <img id="modal-image" src="" alt="Large screenshot">
            </div>
            <button class="modal-close" id="modal-close" aria-label="Close image"><i class="fas fa-times"></i></button>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <p>GameHub &copy; 2025. Your ultimate platform for gaming news, updates, and downloads.</p>
            <div class="social-links">
                <a href="https://twitter.com/gamehub" aria-label="Follow us on Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://facebook.com/gamehub" aria-label="Follow us on Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/gamehub" aria-label="Follow us on Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://discord.gg/gamehub" aria-label="Join our Discord"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <script>
        function generateMathQuestion() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            return { question: `${num1} + ${num2} = ?`, answer: num1 + num2 };
        }

        function preloadImage(url, fallback) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(url);
                img.onerror = () => resolve(fallback);
                img.src = url;
            });
        }

        function handleSearch() {
            const query = document.getElementById("search-input").value.trim();
            if (query) {
                window.location.href = `search.html?query=${encodeURIComponent(query)}`;
            }
        }

        function initializeModalZoom() {
            const modal = document.getElementById("image-modal");
            const modalImage = document.getElementById("modal-image");
            const modalImageContainer = document.getElementById("modal-image-container");
            let scale = 1, translateX = 0, translateY = 0, isDragging = false, startX = 0, startY = 0, pinchStartDistance = 0;

            function updateTransform() {
                modalImage.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
            }

            modalImageContainer.addEventListener("wheel", (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                scale = Math.min(Math.max(scale + delta, 1), 5);
                updateTransform();
            });

            modalImageContainer.addEventListener("mousedown", (e) => {
                if (scale <= 1) return;
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                modalImageContainer.style.cursor = "grabbing";
            });

            modalImageContainer.addEventListener("mousemove", (e) => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateTransform();
            });

            modalImageContainer.addEventListener("mouseup", () => {
                isDragging = false;
                modalImageContainer.style.cursor = "grab";
            });

            modalImageContainer.addEventListener("mouseleave", () => {
                isDragging = false;
                modalImageContainer.style.cursor = "grab";
            });

            modalImageContainer.addEventListener("touchstart", (e) => {
                if (e.touches.length === 1) {
                    if (scale <= 1) return;
                    isDragging = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchStartDistance = Math.sqrt(dx * dx + dy * dy);
                }
            });

            modalImageContainer.addEventListener("touchmove", (e) => {
                e.preventDefault();
                if (isDragging && e.touches.length === 1) {
                    translateX = e.touches[0].clientX - startX;
                    translateY = e.touches[0].clientY - startY;
                    updateTransform();
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    scale = Math.min(Math.max(scale * (distance / pinchStartDistance), 1), 5);
                    pinchStartDistance = distance;
                    updateTransform();
                }
            });

            modalImageContainer.addEventListener("touchend", () => {
                isDragging = false;
                pinchStartDistance = 0;
            });

            modalImageContainer.addEventListener("dblclick", () => {
                scale = 1;
                translateX = 0;
                translateY = 0;
                updateTransform();
            });
        }

        function showModal(imageSrc) {
            const modal = document.getElementById("image-modal");
            const modalImage = document.getElementById("modal-image");
            modalImage.src = imageSrc;
            modalImage.alt = "Large screenshot";
            modal.style.display = "flex";
            modalImage.style.transform = "scale(1) translate(0px, 0px)";
        }

        function closeModal() {
            document.getElementById("image-modal").style.display = "none";
        }

        async function loadDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const page = params.get("page") || "1";
            const query = params.get("query") || "";
            const tag = params.get("tag") || "";
            const from = params.get("from") || "index";

            const logoLink = document.getElementById("logo-link");
            if (from === "search" && query) {
                logoLink.href = `search.html?page=${page}&query=${encodeURIComponent(query)}`;
            } else if (from === "tag-results" && tag) {
                logoLink.href = `tag-results.html?page=${page}&tag=${encodeURIComponent(tag)}`;
            } else {
                logoLink.href = `index.html?page=${page}`;
            }

            if (id === null || isNaN(id) || id < 0) {
                document.getElementById("game-details-content").innerHTML = `
                    <div class="game-content">
                        <p class="error-message">Invalid game ID: ${id}</p>
                    </div>
                `;
                return;
            }

            const gameId = parseInt(id, 10);
            try {
                const protoContent = `
                    syntax = "proto3";
                    package gamehub;
                    message Game {
                        string title = 1;
                        string developer = 2;
                        string version = 3;
                        string status = 4;
                        repeated string tags = 5;
                        string description = 6;
                        string download = 7;
                        string language = 8;
                        repeated string images = 9;
                        string thumbnail = 10;
                    }
                    message GameList {
                        repeated Game games = 1;
                    }
                `;
                const root = await protobuf.parse(protoContent, { keepCase: true }).root;
                const GameListMessage = root.lookupType("gamehub.GameList");
                const response = await fetch('public/data/games.pb');
                if (!response.ok) {
                    throw new Error(`Failed to fetch games.pb: ${response.statusText}`);
                }
                const protoBinaryData = new Uint8Array(await response.arrayBuffer());
                const message = GameListMessage.decode(protoBinaryData);
                const games = message.games;

                if (gameId >= games.length || gameId < 0) {
                    document.getElementById("game-details-content").innerHTML = `
                        <div class="game-content">
                            <p class="error-message">Game not found for ID: ${gameId}</p>
                        </div>
                    `;
                    return;
                }

                const game = games[gameId];
                document.title = `${game.title} - GameHub`;
                const cleanDownload = game.download ? game.download.trim() : '#';
                const thumbnailImage = await preloadImage(
                    game.thumbnail || (game.images && game.images[0]) || 'https://via.placeholder.com/400x200?text=Game+Cover',
                    'https://via.placeholder.com/400x200?text=Game+Cover'
                );
                const galleryImages = game.images ? game.images.filter(img => img !== game.thumbnail) : [];
                const preloadedGalleryImages = await Promise.all(
                    galleryImages.map(img => preloadImage(img, 'https://via.placeholder.com/200x150?text=Game+Cover'))
                );
                let galleryHTML = preloadedGalleryImages.length > 0 ? `
                    <h3>Screenshots (${preloadedGalleryImages.length})</h3>
                    <div class="gallery">
                        ${preloadedGalleryImages.map((img, index) => `
                            <img src="${img}" alt="${game.title} screenshot ${index + 1}" loading="lazy" onclick="showModal('${img}')" width="180" height="150">
                        `).join('')}
                    </div>
                ` : '';

                const math = generateMathQuestion();
                document.getElementById("game-details-content").innerHTML = `
                    <div class="game-content">
                        <h2>${game.title}</h2>
                        <img src="${thumbnailImage}" class="game-thumbnail" alt="${game.title} thumbnail" width="400" height="200">
                        ${galleryHTML}
                        <p><b>Developer:</b> ${game.developer}</p>
                        <p><b>Version:</b> ${game.version}</p>
                        <p><b>Status:</b> ${game.status}</p>
                        <p><b>Language:</b> ${game.language}</p>
                        <p><b>Description:</b> ${game.description}</p>
                        <p><b>Tags:</b> ${game.tags.map(tag => `<a href="tag-results.html?tag=${encodeURIComponent(tag)}" class="tag-button">${tag}</a>`).join(", ")}</p>
                        <div class="download-section">
                            <div class="math-challenge">
                                <label for="math-answer">${math.question}</label>
                                <input type="number" id="math-answer" placeholder="Answer" aria-label="Math challenge answer">
                                <button id="verify-answer">Verify</button>
                            </div>
                            <a href="${cleanDownload}" id="download-link" class="download-button" target="_blank" rel="noopener noreferrer" aria-disabled="true">Download Game</a>
                        </div>
                    </div>
                `;

                document.getElementById("verify-answer").addEventListener("click", () => {
                    const userAnswer = parseInt(document.getElementById("math-answer").value);
                    const downloadLink = document.getElementById("download-link");
                    if (userAnswer === math.answer) {
                        downloadLink.classList.add("active");
                        downloadLink.setAttribute("aria-disabled", "false");
                    } else {
                        alert("Incorrect answer. Please try again.");
                        document.getElementById("math-answer").value = "";
                    }
                });

                document.getElementById("math-answer").addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        document.getElementById("verify-answer").click();
                    }
                });

                document.getElementById("search-button").addEventListener("click", handleSearch);
                document.getElementById("search-input").addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        handleSearch();
                    }
                });

                document.getElementById("modal-close").addEventListener("click", closeModal);
                document.getElementById("image-modal").addEventListener("click", (e) => {
                    if (e.target === document.getElementById("image-modal")) {
                        closeModal();
                    }
                });

                initializeModalZoom();
            } catch (error) {
                document.getElementById("game-details-content").innerHTML = `
                    <div class="game-content">
                        <p class="error-message">Failed to load game details: ${error.message}</p>
                    </div>
                `;
            }
        }

        window.onload = loadDetails;
    </script>
</body>

</html>
